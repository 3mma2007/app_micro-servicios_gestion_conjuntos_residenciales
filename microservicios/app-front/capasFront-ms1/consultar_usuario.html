<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Consultar Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
  <script src="/auth.js"></script>
  <script>
    const SESSION = requireAuth();
    if (!SESSION) throw new Error('no session');
  </script>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-people me-1"></i>MS1 · Usuarios</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="ver_usuarios.html">Ver</a></li>
          <li class="nav-item"><a class="nav-link" href="insertar_usuario.html">Insertar</a></li>
          <li class="nav-item"><a class="nav-link active" href="consultar_usuario.html">Consultar</a></li>
          <li class="nav-item"><a class="nav-link" href="editar_usuario.html">Editar</a></li>
          <li class="nav-item"><a class="nav-link" href="borrar_usuario.html">Eliminar</a></li>
        </ul>
        <div id="user-badge"></div>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card shadow-sm col-md-6 mx-auto">
      <div class="card-header bg-info text-white py-3">
        <h4 class="mb-0"><i class="bi bi-search me-2"></i>Consultar Usuario</h4>
      </div>
      <div class="card-body">
        <form id="buscar-form" class="mb-4">
          <label for="id" class="form-label">ID del usuario</label>
          <input type="number" id="id" class="form-control mb-3" placeholder="Ingrese el ID" required/>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-info text-white"><i class="bi bi-search me-1"></i>Buscar</button>
            <a href="index.html" class="btn btn-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
          </div>
        </form>

        <div id="resultado" class="d-none">
          <hr/>
          <table class="table table-bordered">
            <tbody>
              <tr><th class="table-light" style="width:35%">ID</th><td id="uid"></td></tr>
              <tr><th class="table-light">Nombre</th><td id="unombre"></td></tr>
              <tr><th class="table-light">Teléfono</th><td id="utelefono"></td></tr>
              <tr><th class="table-light">Email</th><td id="uemail"></td></tr>
              <tr><th class="table-light">Username</th><td id="uusername"></td></tr>
              <tr><th class="table-light">Rol</th><td id="urol"></td></tr>
              <tr><th class="table-light">Conjunto</th><td id="uconjunto"></td></tr>
            </tbody>
          </table>
        </div>

        <div id="mensaje" class="alert mt-3 d-none"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    addUserBadge('#navbarNav', SESSION);

    document.getElementById('buscar-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      document.getElementById('resultado').classList.add('d-none');
      document.getElementById('mensaje').classList.add('d-none');

      try {
        const res  = await fetch(`http://192.168.100.2:3000/api/usuarios/${document.getElementById('id').value}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        document.getElementById('uid').textContent       = data.id;
        document.getElementById('unombre').textContent   = data.nombre;
        document.getElementById('utelefono').textContent = data.telefono;
        document.getElementById('uemail').textContent    = data.email;
        document.getElementById('uusername').textContent = data.username ?? '—';
        document.getElementById('uconjunto').textContent = data.conjunto_id ?? '—';

        const badgeRol = { administrador: 'bg-danger', arrendatario: 'bg-success', arrendador: 'bg-info text-dark' }[data.rol] || 'bg-secondary';
        document.getElementById('urol').innerHTML = `<span class="badge ${badgeRol}">${data.rol}</span>`;

        document.getElementById('resultado').classList.remove('d-none');
      } catch (err) {
        const msg = document.getElementById('mensaje');
        msg.classList.remove('d-none');
        msg.className = 'alert alert-danger mt-3';
        msg.textContent = err.message || 'Usuario no encontrado.';
      }
    });
  </script>
</body>
</html>
