<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Editar Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
  <script src="/auth.js"></script>
  <script>
    const SESSION = requireAuth();
    if (!SESSION) throw new Error('no session');
  </script>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-people me-1"></i>MS1 · Usuarios</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="ver_usuarios.html">Ver</a></li>
          <li class="nav-item"><a class="nav-link" href="insertar_usuario.html">Insertar</a></li>
          <li class="nav-item"><a class="nav-link" href="consultar_usuario.html">Consultar</a></li>
          <li class="nav-item"><a class="nav-link active" href="editar_usuario.html">Editar</a></li>
          <li class="nav-item"><a class="nav-link" href="borrar_usuario.html">Eliminar</a></li>
        </ul>
        <div id="user-badge"></div>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card shadow-sm col-md-7 mx-auto">
      <div class="card-header bg-warning text-dark py-3">
        <h4 class="mb-0"><i class="bi bi-pencil me-2"></i>Editar Usuario</h4>
      </div>
      <div class="card-body">
        <form id="buscar-form" class="mb-4">
          <label for="id-buscar" class="form-label">Ingrese el ID del usuario a editar</label>
          <div class="d-flex gap-2">
            <input type="number" id="id-buscar" class="form-control" required/>
            <button type="submit" class="btn btn-outline-warning">
              <i class="bi bi-search me-1"></i>Buscar
            </button>
          </div>
        </form>

        <form id="editar-form" class="d-none">
          <hr/>
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input type="text" id="nombre" class="form-control" required/>
          </div>
          <div class="mb-3">
            <label for="telefono" class="form-label">Teléfono</label>
            <input type="text" id="telefono" class="form-control" required/>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" required/>
          </div>
          <div class="mb-3">
            <label for="rol" class="form-label">Rol</label>
            <select class="form-select" id="rol" required onchange="onRolChange()">
              <!-- Las opciones se cargan dinámicamente según permisos -->
            </select>
          </div>

          <!-- Campos solo para administradores -->
          <div id="bloque-admin" class="d-none">
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" id="username" class="form-control"/>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Nueva contraseña <small class="text-muted">(dejar vacío para no cambiar)</small></label>
              <input type="password" id="password" class="form-control" minlength="6"/>
            </div>
            <div class="mb-3" id="bloque-conjunto">
              <label for="conjunto_id" class="form-label">ID del conjunto</label>
              <input type="number" id="conjunto_id" class="form-control"/>
            </div>
          </div>

          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-warning"><i class="bi bi-floppy me-1"></i>Guardar Cambios</button>
            <a href="index.html" class="btn btn-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
          </div>
        </form>

        <div id="mensaje" class="alert mt-4 d-none"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    addUserBadge('#navbarNav', SESSION);
    const superAdmin = isSuperAdmin(SESSION);
    let usuarioId = null;

    function buildRolSelect(rolActual) {
      const select = document.getElementById('rol');
      select.innerHTML = '';
      const roles = superAdmin
        ? ['administrador', 'arrendatario', 'arrendador']
        : ['arrendatario', 'arrendador'];
      roles.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r;
        opt.textContent = r.charAt(0).toUpperCase() + r.slice(1);
        if (r === rolActual) opt.selected = true;
        select.appendChild(opt);
      });
    }

    function onRolChange() {
      const rol = document.getElementById('rol').value;
      const bloque = document.getElementById('bloque-admin');
      if (rol === 'administrador') {
        bloque.classList.remove('d-none');
      } else {
        bloque.classList.add('d-none');
      }
    }

    document.getElementById('buscar-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      usuarioId = document.getElementById('id-buscar').value;

      try {
        const res  = await fetch(`http://192.168.100.2:3000/api/usuarios/${usuarioId}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        buildRolSelect(data.rol);
        document.getElementById('nombre').value      = data.nombre;
        document.getElementById('telefono').value    = data.telefono;
        document.getElementById('email').value       = data.email;
        document.getElementById('username').value    = data.username ?? '';
        document.getElementById('conjunto_id').value = data.conjunto_id ?? '';
        onRolChange();
        document.getElementById('editar-form').classList.remove('d-none');
        document.getElementById('mensaje').classList.add('d-none');
      } catch (err) {
        const msg = document.getElementById('mensaje');
        msg.classList.remove('d-none');
        msg.className = 'alert alert-danger mt-4';
        msg.textContent = err.message || 'Usuario no encontrado.';
      }
    });

    document.getElementById('editar-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const rol         = document.getElementById('rol').value;
      const conjunto_id = rol === 'administrador'
        ? (document.getElementById('conjunto_id').value ? parseInt(document.getElementById('conjunto_id').value) : null)
        : null;

      try {
        const res = await fetch(`http://192.168.100.2:3000/api/usuarios/${usuarioId}`, {
          method:  'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nombre:     document.getElementById('nombre').value,
            telefono:   document.getElementById('telefono').value,
            email:      document.getElementById('email').value,
            username:   document.getElementById('username').value || null,
            password:   document.getElementById('password').value || null,
            rol,
            conjunto_id
          })
        });
        const data = await res.json();
        const msg  = document.getElementById('mensaje');
        msg.classList.remove('d-none', 'alert-danger', 'alert-success');
        msg.classList.add('alert', data.error ? 'alert-danger' : 'alert-success');
        msg.textContent = data.error ? 'Error: ' + data.error : data.mensaje;
      } catch {
        const msg = document.getElementById('mensaje');
        msg.classList.remove('d-none');
        msg.className = 'alert alert-danger mt-4';
        msg.textContent = 'Error al conectar con el servidor.';
      }
    });
  </script>
</body>
</html>
