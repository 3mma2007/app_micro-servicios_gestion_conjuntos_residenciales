<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eliminar Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
  <script src="/auth.js"></script>
  <script>
    const SESSION = requireAuth();
    if (!SESSION) throw new Error('no session');
  </script>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-people me-1"></i>MS1 · Usuarios</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="ver_usuarios.html">Ver</a></li>
          <li class="nav-item"><a class="nav-link" href="insertar_usuario.html">Insertar</a></li>
          <li class="nav-item"><a class="nav-link" href="consultar_usuario.html">Consultar</a></li>
          <li class="nav-item"><a class="nav-link" href="editar_usuario.html">Editar</a></li>
          <li class="nav-item"><a class="nav-link active" href="borrar_usuario.html">Eliminar</a></li>
        </ul>
        <div id="user-badge"></div>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card shadow-sm col-md-6 mx-auto">
      <div class="card-header bg-danger text-white py-3">
        <h4 class="mb-0"><i class="bi bi-trash me-2"></i>Eliminar Usuario</h4>
      </div>
      <div class="card-body">
        <form id="buscar-form">
          <label for="id" class="form-label">ID del usuario a eliminar</label>
          <input type="number" id="id" class="form-control mb-3" required/>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-outline-danger"><i class="bi bi-search me-1"></i>Buscar</button>
            <a href="index.html" class="btn btn-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
          </div>
        </form>

        <!-- Confirmación antes de eliminar -->
        <div id="bloque-confirm" class="d-none mt-4">
          <hr/>
          <p class="mb-1"><strong>Nombre:</strong> <span id="c-nombre"></span></p>
          <p class="mb-1"><strong>Rol:</strong> <span id="c-rol"></span></p>
          <p class="mb-1"><strong>Email:</strong> <span id="c-email"></span></p>
          <p class="text-danger fw-bold mt-3">¿Confirma que desea eliminar este usuario?</p>
          <div class="d-flex gap-2">
            <button id="btn-confirmar" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Sí, eliminar</button>
            <button id="btn-cancelar"  class="btn btn-secondary">Cancelar</button>
          </div>
        </div>

        <div id="mensaje" class="alert mt-4 d-none"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    addUserBadge('#navbarNav', SESSION);
    let idEliminar = null;

    function showMsg(type, text) {
      const m = document.getElementById('mensaje');
      m.classList.remove('d-none', 'alert-danger', 'alert-success');
      m.classList.add('alert', `alert-${type}`);
      m.textContent = text;
    }

    document.getElementById('buscar-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      idEliminar = document.getElementById('id').value;
      document.getElementById('bloque-confirm').classList.add('d-none');
      document.getElementById('mensaje').classList.add('d-none');

      try {
        const res  = await fetch(`http://192.168.100.2:3000/api/usuarios/${idEliminar}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        document.getElementById('c-nombre').textContent = data.nombre;
        document.getElementById('c-email').textContent  = data.email;
        document.getElementById('c-rol').innerHTML =
          `<span class="badge ${{ administrador:'bg-danger', arrendatario:'bg-success', arrendador:'bg-info text-dark' }[data.rol]}">${data.rol}</span>`;

        document.getElementById('bloque-confirm').classList.remove('d-none');
      } catch (err) {
        showMsg('danger', err.message || 'Usuario no encontrado.');
      }
    });

    document.getElementById('btn-confirmar').addEventListener('click', async function() {
      try {
        const res  = await fetch(`http://192.168.100.2:3000/api/usuarios/${idEliminar}`, { method: 'DELETE' });
        const data = await res.json();
        document.getElementById('bloque-confirm').classList.add('d-none');
        showMsg(data.error ? 'danger' : 'success', data.error || data.mensaje);
        if (!data.error) { document.getElementById('buscar-form').reset(); idEliminar = null; }
      } catch {
        showMsg('danger', 'Error al conectar con el servidor.');
      }
    });

    document.getElementById('btn-cancelar').addEventListener('click', function() {
      document.getElementById('bloque-confirm').classList.add('d-none');
      document.getElementById('buscar-form').reset();
      idEliminar = null;
    });
  </script>
</body>
</html>
