<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ver Usuarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
  <script src="/auth.js"></script>
  <script>
    const SESSION = requireAuth();
    if (!SESSION) throw new Error('no session');
  </script>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-people me-1"></i>MS1 · Usuarios</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link active" href="ver_usuarios.html">Ver</a></li>
          <li class="nav-item"><a class="nav-link" href="insertar_usuario.html">Insertar</a></li>
          <li class="nav-item"><a class="nav-link" href="consultar_usuario.html">Consultar</a></li>
          <li class="nav-item"><a class="nav-link" href="editar_usuario.html">Editar</a></li>
          <li class="nav-item"><a class="nav-link" href="borrar_usuario.html">Eliminar</a></li>
        </ul>
        <div id="user-badge"></div>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h2 class="text-center mb-4">Lista de Usuarios</h2>
    <table class="table table-striped table-bordered">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Nombre</th>
          <th>Teléfono</th>
          <th>Email</th>
          <th>Username</th>
          <th>Rol</th>
          <th>Conjunto</th>
        </tr>
      </thead>
      <tbody id="tabla-body">
        <tr><td colspan="7" class="text-center text-muted py-4">
          <div class="spinner-border spinner-border-sm me-2"></div>Cargando...
        </td></tr>
      </tbody>
    </table>
    <div class="text-center mt-4">
      <a href="index.html" class="btn btn-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    addUserBadge('#navbarNav', SESSION);
    const superAdmin = isSuperAdmin(SESSION);

    fetch('http://192.168.100.2:3000/api/usuarios')
      .then(r => r.json())
      .then(data => {
        const tbody = document.getElementById('tabla-body');

        // Superadmin ve todos. Admin regular solo ve no-admins
        // (arrendatarios y arrendadores pueden pertenecer a cualquier conjunto)
        const filtrados = superAdmin
          ? data
          : data.filter(u => u.rol !== 'administrador');

        if (!filtrados.length) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">No hay usuarios registrados.</td></tr>';
          return;
        }

        tbody.innerHTML = '';
        filtrados.forEach(u => {
          const badgeRol = {
            administrador: 'bg-danger',
            arrendatario:  'bg-success',
            arrendador:    'bg-info text-dark'
          }[u.rol] || 'bg-secondary';

          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${u.id}</td>
            <td>${u.nombre}</td>
            <td>${u.telefono}</td>
            <td>${u.email}</td>
            <td>${u.username ?? '—'}</td>
            <td><span class="badge ${badgeRol}">${u.rol}</span></td>
            <td>${u.conjunto_id ?? '—'}</td>
          `;
          tbody.appendChild(row);
        });
      })
      .catch(() => {
        document.getElementById('tabla-body').innerHTML =
          '<tr><td colspan="7" class="text-center text-danger py-4">Error al conectar con el servidor.</td></tr>';
      });
  </script>
</body>
</html>
