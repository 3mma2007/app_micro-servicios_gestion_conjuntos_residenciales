<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cambiar Contraseña</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; }
    .card-pw { max-width: 440px; margin: 80px auto 0; border:none; border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,0.10); }
    .card-header-pw { background:#dc3545; border-radius:16px 16px 0 0; padding:28px 24px 18px; text-align:center; color:#fff; }
    .card-header-pw i { font-size:42px; display:block; margin-bottom:8px; }
  </style>
</head>
<body>
  <div class="card card-pw">
    <div class="card-header-pw">
      <i class="bi bi-shield-lock"></i>
      <h5 class="mb-0 fw-bold">Cambio de contraseña requerido</h5>
      <small class="opacity-75">Debes establecer una nueva contraseña antes de continuar</small>
    </div>
    <div class="card-body p-4">
      <div id="info-usuario" class="alert alert-info mb-4 d-none"></div>
      <form id="form-cambiar">
        <div class="mb-3">
          <label for="nueva" class="form-label fw-semibold">Nueva contraseña</label>
          <input type="password" class="form-control" id="nueva"
                 placeholder="Mínimo 6 caracteres" required minlength="6"/>
        </div>
        <div class="mb-4">
          <label for="confirmar" class="form-label fw-semibold">Confirmar contraseña</label>
          <input type="password" class="form-control" id="confirmar"
                 placeholder="Repite la nueva contraseña" required/>
        </div>
        <button type="submit" class="btn btn-danger btn-lg w-100">
          <i class="bi bi-floppy me-2"></i>Guardar nueva contraseña
        </button>
      </form>
      <div id="msg" class="alert mt-3 d-none"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Verificar que hay sesión y que realmente necesita cambiar contraseña
    const sessionRaw = localStorage.getItem('admin_session');
    if (!sessionRaw) {
      window.location.replace('/login.html');
    }
    const session = JSON.parse(sessionRaw);
    if (session.password_changed === 1) {
      // Ya cambió la contraseña, no necesita estar aquí
      window.location.replace('/capasFront-ms1/index.html');
    }

    // Mostrar nombre del usuario
    const infoDiv = document.getElementById('info-usuario');
    infoDiv.textContent = `Bienvenido, ${session.nombre}. Esta es tu primera sesión — establece una contraseña segura.`;
    infoDiv.classList.remove('d-none');

    document.getElementById('form-cambiar').addEventListener('submit', async function(e) {
      e.preventDefault();

      const nueva     = document.getElementById('nueva').value;
      const confirmar = document.getElementById('confirmar').value;
      const msg       = document.getElementById('msg');

      msg.classList.add('d-none');

      if (nueva !== confirmar) {
        msg.textContent = 'Las contraseñas no coinciden.';
        msg.className   = 'alert alert-danger mt-3';
        msg.classList.remove('d-none');
        return;
      }

      try {
        const res  = await fetch(`http://192.168.100.2:3000/api/usuarios/${session.id}/cambiar-password`, {
          method:  'PUT',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ nueva_password: nueva })
        });
        const data = await res.json();

        if (data.error) throw new Error(data.error);

        // Actualizar sesión local
        session.password_changed = 1;
        localStorage.setItem('admin_session', JSON.stringify(session));

        msg.textContent = '¡Contraseña actualizada! Redirigiendo...';
        msg.className   = 'alert alert-success mt-3';
        msg.classList.remove('d-none');

        setTimeout(() => window.location.replace('/capasFront-ms1/index.html'), 1500);

      } catch (err) {
        msg.textContent = err.message || 'Error al conectar con el servidor.';
        msg.className   = 'alert alert-danger mt-3';
        msg.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
