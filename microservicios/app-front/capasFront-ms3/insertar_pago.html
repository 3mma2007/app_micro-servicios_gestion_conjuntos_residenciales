<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registrar Pago</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-building me-2"></i>Gestión de Propiedades</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="bi bi-house-door me-1"></i>Gestiones</a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="ver_gestiones.html">Ver Gestiones</a></li>
              <li><a class="dropdown-item" href="insertar_gestion.html">Insertar Gestión</a></li>
              <li><a class="dropdown-item" href="consultar_gestion.html">Consultar Gestión</a></li>
              <li><a class="dropdown-item" href="eliminar_gestion.html">Eliminar Gestión</a></li>
            </ul>
          </li>
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle active" href="#" data-bs-toggle="dropdown"><i class="bi bi-cash-coin me-1"></i>Pagos</a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="ver_pagos.html">Ver Pagos</a></li>
              <li><a class="dropdown-item" href="insertar_pago.html">Registrar Pago</a></li>
              <li><a class="dropdown-item" href="actualizar_pago.html">Actualizar Estado</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card shadow-sm col-md-6 mx-auto">
      <div class="card-header bg-success text-white py-3">
        <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>Registrar Pago Mensual</h4>
      </div>
      <div class="card-body">
        <p class="text-muted small">El estado se registrará automáticamente como <strong>Pendiente</strong>.</p>
        <form id="form-pago">
          <div class="mb-3">
            <label for="gestion_id" class="form-label">ID de la Gestión</label>
            <input type="number" class="form-control" id="gestion_id" placeholder="Ej: 1" required/>
          </div>
          <div class="mb-3">
            <label for="monto" class="form-label">Monto ($)</label>
            <input type="number" class="form-control" id="monto" placeholder="Ej: 150000" required/>
          </div>
          <div class="row">
            <div class="col-md-7 mb-3">
              <label for="mes" class="form-label">Mes de Facturación</label>
              <select class="form-select" id="mes" required>
                <option value="">Seleccione un mes</option>
                <option value="enero">Enero</option>
                <option value="febrero">Febrero</option>
                <option value="marzo">Marzo</option>
                <option value="abril">Abril</option>
                <option value="mayo">Mayo</option>
                <option value="junio">Junio</option>
                <option value="julio">Julio</option>
                <option value="agosto">Agosto</option>
                <option value="septiembre">Septiembre</option>
                <option value="octubre">Octubre</option>
                <option value="noviembre">Noviembre</option>
                <option value="diciembre">Diciembre</option>
              </select>
            </div>
            <div class="col-md-5 mb-3">
              <label for="anio" class="form-label">Año</label>
              <input type="number" class="form-control" id="anio" placeholder="Ej: 2026" required/>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success"><i class="bi bi-floppy me-1"></i>Registrar</button>
            <a href="index.html" class="btn btn-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</a>
          </div>
        </form>
        <div id="mensaje" class="alert mt-4 d-none"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('form-pago').addEventListener('submit', function(e) {
      e.preventDefault();
      const body = {
        gestion_propiedades_id: parseInt(document.getElementById('gestion_id').value),
        monto:                  parseInt(document.getElementById('monto').value),
        mes_facturacion:        document.getElementById('mes').value,
        anio_facturacion:       parseInt(document.getElementById('anio').value)
      };
      fetch('http://192.168.100.2:3002/api/pagos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      })
      .then(r => r.json())
      .then(data => {
        const msg = document.getElementById('mensaje');
        msg.classList.remove('d-none', 'alert-danger', 'alert-success');
        if (data.error) {
          msg.classList.add('alert', 'alert-danger');
          msg.textContent = 'Error: ' + data.error;
        } else {
          msg.classList.add('alert', 'alert-success');
          msg.textContent = data.mensaje + ' (ID: ' + data.id + ')';
          document.getElementById('form-pago').reset();
        }
      })
      .catch(() => {
        const msg = document.getElementById('mensaje');
        msg.classList.remove('d-none');
        msg.className = 'alert alert-danger mt-4';
        msg.textContent = 'Error al conectar con el servidor.';
      });
    });
  </script>
</body>
</html>
